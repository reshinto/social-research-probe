<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="620" viewBox="0 0 1040 620" role="img" aria-labelledby="title desc"><title id="title">Architecture landscape</title><desc id="desc">A layered landscape showing sources, platform adapters, pipeline river, services, technologies, cache, and reports.</desc><rect width="1040" height="620" fill="#ffffff"/><text x="32" y="42" font-family="Arial" font-size="28" font-weight="700">Architecture as a research landscape</text><text x="32" y="70" font-family="Arial" font-size="16" fill="#334155">Source-specific adapters feed a shared pipeline river. Services coordinate reusable work. Technologies sit at the edge.</text><path d="M40 500 C210 430,255 445,380 380 C535 300,575 320,725 230 C840 160,925 150,1000 110 L1000 590 L40 590 Z" fill="#ecfeff" stroke="#0f766e" stroke-width="3"/><path d="M70 500 C250 435,320 430,440 360 C560 290,655 275,760 205 C850 145,925 125,990 95" fill="none" stroke="#0891b2" stroke-width="16" stroke-linecap="round"/><g font-family="Arial"><circle cx="105" cy="185" r="55" fill="#dcfce7" stroke="#15803d" stroke-width="3"/><text x="66" y="180" font-size="16" font-weight="700">Sources</text><text x="58" y="203" font-size="13">YouTube now</text><text x="49" y="221" font-size="13">future platforms</text><path d="M170 185 C230 165,275 170,330 210" fill="none" stroke="#15803d" stroke-width="4" marker-end="url(#arrow)"/><rect x="330" y="155" width="170" height="110" rx="18" fill="#ffedd5" stroke="#ea580c" stroke-width="3"/><text x="362" y="188" font-size="17" font-weight="700">Platform</text><text x="360" y="212" font-size="14">fetch + normalize</text><text x="358" y="234" font-size="14">source contract</text><rect x="560" y="115" width="190" height="105" rx="18" fill="#dbeafe" stroke="#1d4ed8" stroke-width="3"/><text x="604" y="148" font-size="17" font-weight="700">Services</text><text x="590" y="172" font-size="14">score, enrich, analyze</text><text x="595" y="194" font-size="14">synthesize, report</text><rect x="810" y="70" width="170" height="105" rx="18" fill="#ede9fe" stroke="#7c3aed" stroke-width="3"/><text x="846" y="103" font-size="17" font-weight="700">Reports</text><text x="838" y="127" font-size="14">HTML, Markdown</text><text x="852" y="149" font-size="14">charts, packet</text><circle cx="270" cy="430" r="55" fill="#fef3c7" stroke="#d97706" stroke-width="3"/><text x="231" y="424" font-size="16" font-weight="700">Config</text><text x="228" y="447" font-size="13">gates + secrets</text><circle cx="520" cy="455" r="62" fill="#f8fafc" stroke="#475569" stroke-width="3"/><text x="485" y="448" font-size="16" font-weight="700">Cache</text><text x="466" y="471" font-size="13">repeat-run memory</text><circle cx="755" cy="405" r="62" fill="#fee2e2" stroke="#dc2626" stroke-width="3"/><text x="710" y="399" font-size="16" font-weight="700">Technologies</text><text x="717" y="422" font-size="13">APIs, CLIs, algos</text></g><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#15803d"/></marker></defs></svg>
