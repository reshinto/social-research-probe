<svg xmlns="http://www.w3.org/2000/svg" width="760" height="300" viewBox="0 0 760 300" role="img" aria-labelledby="title desc">
  <title id="title">Pearson correlation example</title>
  <desc id="desc">Three scatter plots showing positive, negative, and near-zero correlation.</desc>
  <rect width="760" height="300" fill="#ffffff"/>
  <text x="28" y="34" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#111111">Pearson r: how two numeric series move together</text>
  <g transform="translate(70,70)">
    <rect width="170" height="150" fill="#f8fafc" stroke="#334155"/>
    <circle cx="35" cy="120" r="6" fill="#1d4ed8"/><circle cx="65" cy="95" r="6" fill="#1d4ed8"/><circle cx="95" cy="70" r="6" fill="#1d4ed8"/><circle cx="130" cy="42" r="6" fill="#1d4ed8"/>
    <text x="28" y="178" font-family="Arial, sans-serif" font-size="15" fill="#111111">r near +1</text>
  </g>
  <g transform="translate(295,70)">
    <rect width="170" height="150" fill="#f8fafc" stroke="#334155"/>
    <circle cx="35" cy="35" r="6" fill="#dc2626"/><circle cx="70" cy="65" r="6" fill="#dc2626"/><circle cx="105" cy="95" r="6" fill="#dc2626"/><circle cx="135" cy="120" r="6" fill="#dc2626"/>
    <text x="28" y="178" font-family="Arial, sans-serif" font-size="15" fill="#111111">r near -1</text>
  </g>
  <g transform="translate(520,70)">
    <rect width="170" height="150" fill="#f8fafc" stroke="#334155"/>
    <circle cx="35" cy="92" r="6" fill="#7c3aed"/><circle cx="65" cy="45" r="6" fill="#7c3aed"/><circle cx="100" cy="115" r="6" fill="#7c3aed"/><circle cx="135" cy="70" r="6" fill="#7c3aed"/>
    <text x="33" y="178" font-family="Arial, sans-serif" font-size="15" fill="#111111">r near 0</text>
  </g>
</svg>
