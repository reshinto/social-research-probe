<svg xmlns="http://www.w3.org/2000/svg" width="760" height="250" viewBox="0 0 760 250" role="img" aria-labelledby="title desc">
  <title id="title">Outlier count and fraction example</title>
  <desc id="desc">A cluster of normal points with one far away point marked as an outlier.</desc>
  <rect width="760" height="250" fill="#ffffff"/>
  <text x="28" y="34" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#111111">Outliers: values far from the group</text>
  <ellipse cx="300" cy="130" rx="150" ry="55" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
  <g fill="#dbeafe" stroke="#1d4ed8" stroke-width="2">
    <circle cx="220" cy="125" r="10"/><circle cx="260" cy="145" r="10"/><circle cx="305" cy="110" r="10"/><circle cx="340" cy="135" r="10"/><circle cx="385" cy="120" r="10"/>
  </g>
  <circle cx="610" cy="70" r="14" fill="#fee2e2" stroke="#dc2626" stroke-width="3"/>
  <line x1="440" y1="112" x2="595" y2="76" stroke="#dc2626" stroke-width="3" stroke-dasharray="7 6"/>
  <text x="535" y="112" font-family="Arial, sans-serif" font-size="16" fill="#dc2626">outlier</text>
  <text x="95" y="215" font-family="Arial, sans-serif" font-size="16" fill="#111111">outlier_count = 1; outlier_fraction = 1 / 6 = 0.167</text>
</svg>
