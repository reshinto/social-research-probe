<svg xmlns="http://www.w3.org/2000/svg" width="760" height="230" viewBox="0 0 760 230" role="img" aria-labelledby="title desc">
  <title id="title">Minimum maximum and range example</title>
  <desc id="desc">A number line showing minimum 0.50, maximum 0.91, and range 0.41.</desc>
  <rect width="760" height="230" fill="#ffffff"/>
  <text x="28" y="34" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#111111">Minimum, maximum, and range</text>
  <line x1="120" y1="120" x2="640" y2="120" stroke="#334155" stroke-width="4"/>
  <line x1="120" y1="105" x2="120" y2="135" stroke="#dc2626" stroke-width="4"/>
  <line x1="640" y1="105" x2="640" y2="135" stroke="#15803d" stroke-width="4"/>
  <path d="M125 165 C250 195, 510 195, 635 165" fill="none" stroke="#7c3aed" stroke-width="3"/>
  <text x="87" y="92" font-family="Arial, sans-serif" font-size="17" fill="#dc2626">min 0.50</text>
  <text x="600" y="92" font-family="Arial, sans-serif" font-size="17" fill="#15803d">max 0.91</text>
  <text x="305" y="205" font-family="Arial, sans-serif" font-size="18" fill="#7c3aed">range = 0.91 - 0.50 = 0.41</text>
</svg>
