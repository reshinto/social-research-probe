<svg xmlns="http://www.w3.org/2000/svg" width="860" height="360" viewBox="0 0 860 360" role="img" aria-labelledby="title desc">
  <title id="title">Naive Bayes</title>
  <desc id="desc">Combines class priors and feature likelihoods for a simple classifier.</desc>
  <rect width="860" height="360" fill="#ffffff"/>
  <text x="28" y="38" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111111">Naive Bayes</text>
  <text x="28" y="66" font-family="Arial, sans-serif" font-size="15" fill="#334155">Combines class priors and feature likelihoods for a simple classifier.</text>
  <rect x="80" y="105" width="170" height="70" rx="8" fill="#dcfce7" stroke="#15803d" stroke-width="2"/><text x="120" y="145" font-family="Arial" font-size="16">class priors</text><rect x="80" y="215" width="170" height="70" rx="8" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/><text x="112" y="255" font-family="Arial" font-size="16">feature densities</text><circle cx="455" cy="195" r="70" fill="#fef3c7" stroke="#d97706" stroke-width="3"/><text x="405" y="190" font-family="Arial" font-size="16">multiply</text><text x="405" y="212" font-family="Arial" font-size="16">evidence</text><rect x="640" y="160" width="150" height="70" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/><text x="675" y="200" font-family="Arial" font-size="16">class pick</text><line x1="250" y1="140" x2="385" y2="180" stroke="#334155" stroke-width="3"/><line x1="250" y1="250" x2="385" y2="210" stroke="#334155" stroke-width="3"/><line x1="525" y1="195" x2="640" y2="195" stroke="#334155" stroke-width="3"/>
</svg>
