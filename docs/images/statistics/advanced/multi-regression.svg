<svg xmlns="http://www.w3.org/2000/svg" width="860" height="360" viewBox="0 0 860 360" role="img" aria-labelledby="title desc">
  <title id="title">Multiple regression</title>
  <desc id="desc">Predicts one continuous target from several features at the same time.</desc>
  <rect width="860" height="360" fill="#ffffff"/>
  <text x="28" y="38" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111111">Multiple regression</text>
  <text x="28" y="66" font-family="Arial, sans-serif" font-size="15" fill="#334155">Predicts one continuous target from several features at the same time.</text>
  <g font-family="Arial"><rect x="90" y="95" width="170" height="55" rx="8" fill="#dcfce7" stroke="#15803d"/><text x="120" y="130">trust</text><rect x="90" y="165" width="170" height="55" rx="8" fill="#dbeafe" stroke="#1d4ed8"/><text x="120" y="200">trend</text><rect x="90" y="235" width="170" height="55" rx="8" fill="#fef3c7" stroke="#d97706"/><text x="120" y="270">opportunity</text><rect x="560" y="150" width="190" height="85" rx="8" fill="#ede9fe" stroke="#7c3aed"/><text x="590" y="185">predicted overall</text><text x="590" y="210">with coefficients</text></g><line x1="260" y1="122" x2="560" y2="177" stroke="#334155" stroke-width="3"/><line x1="260" y1="192" x2="560" y2="192" stroke="#334155" stroke-width="3"/><line x1="260" y1="262" x2="560" y2="207" stroke="#334155" stroke-width="3"/>
</svg>
