<svg xmlns="http://www.w3.org/2000/svg" width="860" height="360" viewBox="0 0 860 360" role="img" aria-labelledby="title desc">
  <title id="title">Mann-Whitney U</title>
  <desc id="desc">Compares whether values from one group usually rank above the other.</desc>
  <rect width="860" height="360" fill="#ffffff"/>
  <text x="28" y="38" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111111">Mann-Whitney U</text>
  <text x="28" y="66" font-family="Arial, sans-serif" font-size="15" fill="#334155">Compares whether values from one group usually rank above the other.</text>
  <line x1="100" y1="180" x2="760" y2="180" stroke="#334155" stroke-width="2"/><g><circle cx="150" cy="180" r="13" fill="#dbeafe" stroke="#1d4ed8"/><circle cx="220" cy="180" r="13" fill="#dbeafe" stroke="#1d4ed8"/><circle cx="300" cy="180" r="13" fill="#dbeafe" stroke="#1d4ed8"/><circle cx="470" cy="180" r="13" fill="#fee2e2" stroke="#dc2626"/><circle cx="560" cy="180" r="13" fill="#fee2e2" stroke="#dc2626"/><circle cx="650" cy="180" r="13" fill="#fee2e2" stroke="#dc2626"/></g><text x="135" y="225" font-family="Arial" font-size="16" fill="#1d4ed8">group A ranks lower</text><text x="510" y="225" font-family="Arial" font-size="16" fill="#dc2626">group B ranks higher</text>
</svg>
