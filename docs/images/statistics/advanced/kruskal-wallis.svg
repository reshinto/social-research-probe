<svg xmlns="http://www.w3.org/2000/svg" width="860" height="360" viewBox="0 0 860 360" role="img" aria-labelledby="title desc">
  <title id="title">Kruskal-Wallis</title>
  <desc id="desc">Rank-based comparison across groups when raw values are not safely normal.</desc>
  <rect width="860" height="360" fill="#ffffff"/>
  <text x="28" y="38" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111111">Kruskal-Wallis</text>
  <text x="28" y="66" font-family="Arial, sans-serif" font-size="15" fill="#334155">Rank-based comparison across groups when raw values are not safely normal.</text>
  <line x1="90" y1="250" x2="760" y2="250" stroke="#334155" stroke-width="2"/><g font-family="Arial" font-size="15"><circle cx="135" cy="220" r="14" fill="#dbeafe" stroke="#1d4ed8"/><text x="131" y="225">1</text><circle cx="245" cy="190" r="14" fill="#dbeafe" stroke="#1d4ed8"/><text x="241" y="195">3</text><circle cx="365" cy="150" r="14" fill="#dcfce7" stroke="#15803d"/><text x="361" y="155">6</text><circle cx="480" cy="130" r="14" fill="#dcfce7" stroke="#15803d"/><text x="476" y="135">8</text><circle cx="610" cy="95" r="14" fill="#fef3c7" stroke="#d97706"/><text x="606" y="100">10</text></g><text x="120" y="295" font-family="Arial" font-size="16">values become ranks, then group rank sums are compared</text>
</svg>
