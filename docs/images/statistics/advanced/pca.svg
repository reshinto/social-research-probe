  <line x1="150" y1="250" x2="700" y2="250" stroke="#334155"/><line x1="150" y1="250" x2="150" y2="80" stroke="#334155"/><g fill="#dbeafe" stroke="#1d4ed8"><circle cx="220" cy="220" r="8"/><circle cx="270" cy="200" r="8"/><circle cx="330" cy="180" r="8"/><circle cx="410" cy="150" r="8"/><circle cx="500" cy="120" r="8"/><circle cx="590" cy="100" r="8"/></g><line x1="190" y1="230" x2="640" y2="85" stroke="#dc2626" stroke-width="5"/><line x1="400" y1="220" x2="350" y2="70" stroke="#7c3aed" stroke-width="4"/><text x="650" y="85" font-family="Arial" font-size="16" fill="#dc2626">PC1</text><text x="325" y="65" font-family="Arial" font-size="16" fill="#7c3aed">PC2</text>
