<svg xmlns="http://www.w3.org/2000/svg" width="860" height="360" viewBox="0 0 860 360" role="img" aria-labelledby="title desc">
  <title id="title">Kaplan-Meier survival</title>
  <desc id="desc">Shows the fraction that has not yet had an event by each time point.</desc>
  <rect width="860" height="360" fill="#ffffff"/>
  <text x="28" y="38" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111111">Kaplan-Meier survival</text>
  <text x="28" y="66" font-family="Arial, sans-serif" font-size="15" fill="#334155">Shows the fraction that has not yet had an event by each time point.</text>
  <line x1="100" y1="260" x2="735" y2="260" stroke="#334155"/><line x1="100" y1="75" x2="100" y2="260" stroke="#334155"/><polyline points="105,85 220,85 220,120 355,120 355,165 500,165 500,215 690,215" fill="none" stroke="#1d4ed8" stroke-width="5"/><text x="560" y="100" font-family="Arial" font-size="16" fill="#1d4ed8">survival S(t)</text><text x="330" y="292" font-family="Arial" font-size="15">time</text><text x="25" y="190" font-family="Arial" font-size="15" transform="rotate(-90 25 190)">not yet crossed event</text>
</svg>
