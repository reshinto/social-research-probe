<svg xmlns="http://www.w3.org/2000/svg" width="760" height="270" viewBox="0 0 760 270" role="img" aria-labelledby="title desc">
  <title id="title">Average growth rate example</title>
  <desc id="desc">Adjacent values connected by arrows showing period over period change.</desc>
  <rect width="760" height="270" fill="#ffffff"/>
  <text x="28" y="34" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#111111">Average growth rate: adjacent percentage change</text>
  <polyline points="100,205 230,160 360,118 490,140 620,82" fill="none" stroke="#1d4ed8" stroke-width="4"/>
  <g fill="#dbeafe" stroke="#1d4ed8" stroke-width="2">
    <circle cx="100" cy="205" r="10"/><circle cx="230" cy="160" r="10"/><circle cx="360" cy="118" r="10"/><circle cx="490" cy="140" r="10"/><circle cx="620" cy="82" r="10"/>
  </g>
  <text x="155" y="145" font-family="Arial, sans-serif" font-size="15" fill="#15803d">+ change</text>
  <text x="405" y="164" font-family="Arial, sans-serif" font-size="15" fill="#dc2626">- change</text>
  <text x="530" y="67" font-family="Arial, sans-serif" font-size="15" fill="#15803d">+ change</text>
  <text x="80" y="240" font-family="Arial, sans-serif" font-size="16" fill="#111111">The statistic averages these step-by-step percentage movements.</text>
</svg>
