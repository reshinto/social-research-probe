<svg xmlns="http://www.w3.org/2000/svg" width="900" height="340" viewBox="0 0 900 340" role="img" aria-labelledby="title desc"><title id="title">Weighted scoring worked example</title><desc id="desc">Three score axes multiplied by weights and summed into an overall score.</desc><rect width="900" height="340" fill="#ffffff"/><text x="28" y="38" font-family="Arial" font-size="24" font-weight="700">Worked example: weighted sum</text><g font-family="Arial" font-size="17"><rect x="60" y="100" width="180" height="70" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/><text x="90" y="130">trust 0.62</text><text x="90" y="154">× weight 0.45</text><rect x="60" y="195" width="180" height="70" rx="8" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/><text x="90" y="225">trend 0.71</text><text x="90" y="249">× weight 0.30</text><rect x="310" y="145" width="210" height="70" rx="8" fill="#ccfbf1" stroke="#0f766e" stroke-width="2"/><text x="335" y="175">opportunity 0.58</text><text x="335" y="199">× weight 0.25</text><rect x="635" y="135" width="210" height="90" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/><text x="665" y="170" font-weight="700">overall = 0.637</text><text x="665" y="198">rank by this value</text></g><line x1="240" y1="135" x2="635" y2="165" stroke="#334155" stroke-width="3"/><line x1="240" y1="230" x2="635" y2="185" stroke="#334155" stroke-width="3"/><line x1="520" y1="180" x2="635" y2="180" stroke="#334155" stroke-width="3"/><text x="565" y="93" font-family="Arial" font-size="17" fill="#334155">0.279 + 0.213 + 0.145</text></svg>
