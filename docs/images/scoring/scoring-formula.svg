<svg xmlns="http://www.w3.org/2000/svg" width="860" height="430" viewBox="0 0 860 430" role="img" aria-labelledby="title desc">
  <title id="title">Scoring formula overview</title>
  <desc id="desc">Inputs flow into trust, trend, opportunity, then weighted overall score and ranking.</desc>
  <rect width="860" height="430" fill="#ffffff"/>
  <text x="28" y="36" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111111">Scoring: three axes become one ranking score</text>
  <rect x="40" y="80" width="190" height="90" rx="8" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
  <text x="63" y="112" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#111111">Raw item</text>
  <text x="63" y="138" font-family="Arial, sans-serif" font-size="14" fill="#111111">title, URL, channel,</text>
  <text x="63" y="158" font-family="Arial, sans-serif" font-size="14" fill="#111111">published_at, extras</text>
  <rect x="40" y="220" width="190" height="90" rx="8" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
  <text x="63" y="252" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#111111">Engagement</text>
  <text x="63" y="278" font-family="Arial, sans-serif" font-size="14" fill="#111111">velocity, ratio,</text>
  <text x="63" y="298" font-family="Arial, sans-serif" font-size="14" fill="#111111">repetition, age</text>
  <rect x="315" y="55" width="210" height="85" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="347" y="88" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111111">Trust</text>
  <text x="347" y="114" font-family="Arial, sans-serif" font-size="14" fill="#111111">source and reliability signals</text>
  <rect x="315" y="170" width="210" height="85" rx="8" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
  <text x="347" y="203" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111111">Trend</text>
  <text x="347" y="229" font-family="Arial, sans-serif" font-size="14" fill="#111111">velocity, engagement, recency</text>
  <rect x="315" y="285" width="210" height="85" rx="8" fill="#ccfbf1" stroke="#0f766e" stroke-width="2"/>
  <text x="347" y="318" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111111">Opportunity</text>
  <text x="347" y="344" font-family="Arial, sans-serif" font-size="14" fill="#111111">gap, feasibility, novelty</text>
  <rect x="620" y="145" width="200" height="115" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="646" y="178" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111111">Overall score</text>
  <text x="646" y="205" font-family="Arial, sans-serif" font-size="14" fill="#111111">0.45 trust</text>
  <text x="646" y="225" font-family="Arial, sans-serif" font-size="14" fill="#111111">+ 0.30 trend</text>
  <text x="646" y="245" font-family="Arial, sans-serif" font-size="14" fill="#111111">+ 0.25 opportunity</text>
  <text x="645" y="310" font-family="Arial, sans-serif" font-size="17" fill="#111111">sort descending to rank</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker>
  </defs>
  <line x1="230" y1="125" x2="310" y2="95" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="230" y1="265" x2="310" y2="210" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="230" y1="265" x2="310" y2="330" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="525" y1="98" x2="615" y2="185" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="525" y1="212" x2="615" y2="205" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="525" y1="328" x2="615" y2="238" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
</svg>
