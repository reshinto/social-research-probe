<svg xmlns="http://www.w3.org/2000/svg" width="820" height="520" viewBox="0 0 820 520" role="img" aria-labelledby="title desc">
<title id="title">Scoring axis balance example</title><desc id="desc">Radar-style comparison of three items across trust trend and opportunity.</desc><rect width="820" height="520" fill="#ffffff"/><text x="28" y="38" font-family="Arial" font-size="24" font-weight="700">Scoring is easier to read as axis balance</text><g transform="translate(410 270)"><polygon points="0,-170 147,85 -147,85" fill="none" stroke="#cbd5e1" stroke-width="2"/><polygon points="0,-115 100,57 -100,57" fill="none" stroke="#e2e8f0" stroke-width="2"/><polygon points="0,-60 52,30 -52,30" fill="none" stroke="#e2e8f0" stroke-width="2"/><line x1="0" y1="0" x2="0" y2="-180" stroke="#94a3b8"/><line x1="0" y1="0" x2="158" y2="92" stroke="#94a3b8"/><line x1="0" y1="0" x2="-158" y2="92" stroke="#94a3b8"/><polygon points="0,-145 70,40 -55,32" fill="#dbeafe" opacity="0.65" stroke="#1d4ed8" stroke-width="3"/><polygon points="0,-75 140,80 -95,55" fill="#dcfce7" opacity="0.55" stroke="#15803d" stroke-width="3"/><polygon points="0,-105 60,35 -140,80" fill="#fef3c7" opacity="0.55" stroke="#d97706" stroke-width="3"/></g><text x="383" y="72" font-family="Arial" font-size="18" font-weight="700">trust</text><text x="575" y="385" font-family="Arial" font-size="18" font-weight="700">trend</text><text x="190" y="385" font-family="Arial" font-size="18" font-weight="700">opportunity</text><rect x="40" y="435" width="22" height="16" fill="#dbeafe" stroke="#1d4ed8"/><text x="72" y="449" font-family="Arial" font-size="15">credible but slower</text><rect x="270" y="435" width="22" height="16" fill="#dcfce7" stroke="#15803d"/><text x="302" y="449" font-family="Arial" font-size="15">fast-moving</text><rect x="470" y="435" width="22" height="16" fill="#fef3c7" stroke="#d97706"/><text x="502" y="449" font-family="Arial" font-size="15">under-covered opportunity</text></svg>
