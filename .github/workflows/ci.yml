name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: pip install -e '.[dev]'
      - name: Lint
        run: ruff check social_research_probe/ tests/
      - name: Format check
        run: ruff format --check social_research_probe/ tests/
      - name: Tests (with subprocess coverage)
        env:
          COVERAGE_PROCESS_START: ${{ github.workspace }}/pyproject.toml
          PYTHONPATH: ${{ github.workspace }}
        run: pytest tests/integration tests/unit tests/contract --cov=social_research_probe --cov-fail-under=0
      - name: Coverage report (fail under 100%)
        run: coverage report --show-missing --fail-under=100
