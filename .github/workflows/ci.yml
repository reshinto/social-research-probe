name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: pip install -e '.[dev]'
      - name: Lint
        run: ruff check social_research_probe/ tests/
      - name: Format check
        run: ruff format --check social_research_probe/ tests/
      - name: Integration tests
        run: pytest tests/integration --no-cov
      - name: Unit and contract coverage
        run: pytest tests/unit tests/contract --cov=social_research_probe --cov-report=term-missing --cov-fail-under=100
