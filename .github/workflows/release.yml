name: Release

on:
  push:
    branches:
      - main
    paths:
      - VERSION

permissions:
  contents: write

jobs:
  detect-version-change:
    name: Detect VERSION change
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.filter.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Check changed files
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            version:
              - 'VERSION'

  tag-and-release:
    name: Create tag and GitHub release from VERSION
    needs: detect-version-change
    if: needs.detect-version-change.outputs.version_changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Read version from VERSION
        id: version
        run: echo "version=$(tr -d '[:space:]' < VERSION)" >> "$GITHUB_OUTPUT"

      - name: Create and push tag from VERSION
        run: |
          bash scripts/tag_release.sh --yes --skip-existing

      - name: Build release tarball
        run: |
          pip install build
          python -m build

      - name: Generate SHA-256 checksums
        run: sha256sum dist/* > dist/checksums-sha256.txt

      - name: Store distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/checksums-sha256.txt
          generate_release_notes: true
          fail_on_unmatched_files: true

  publish-pypi:
    name: Publish to PyPI
    needs:
      - detect-version-change
      - tag-and-release
    if: needs.detect-version-change.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
