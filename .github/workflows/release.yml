name: Release

on:
  push:
    branches:
      - main
    paths:
      - "VERSION"

permissions:
  contents: write

jobs:
  tag-and-release:
    name: Create tag and GitHub release from VERSION
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Read version from VERSION
        id: version
        run: echo "version=$(tr -d '[:space:]' < VERSION)" >> "$GITHUB_OUTPUT"

      - name: Create and push tag from VERSION
        run: |
          bash scripts/tag_release.sh --yes --skip-existing

      - name: Build release tarball (operational files only)
        run: |
          mkdir -p release/social-research-probe
          cp -r SKILL.md VERSION core adapters reference registry scripts release/social-research-probe/
          mkdir -p release/social-research-probe/setup
          cp setup/install.py setup/update.py setup/requirements.txt release/social-research-probe/setup/
          cp .env.example release/social-research-probe/
          cd release
          tar -czf social-research-probe-${{ steps.version.outputs.version }}.tar.gz social-research-probe
          cd ..

      - name: Build bootstrap installer distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build

      - name: Generate SHA-256 checksums
        run: |
          cd release
          find social-research-probe -type f -exec sha256sum {} \; > checksums.txt
          sha256sum social-research-probe-${{ steps.version.outputs.version }}.tar.gz >> checksums.txt
          cd ..
          sha256sum dist/* >> release/checksums.txt

      - name: Store bootstrap installer distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          files: |
            release/social-research-probe-${{ steps.version.outputs.version }}.tar.gz
            release/checksums.txt
            dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true

  publish-pypi:
    name: Publish bootstrap installer to PyPI
    needs: tag-and-release
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - name: Download bootstrap installer distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish bootstrap installer to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
